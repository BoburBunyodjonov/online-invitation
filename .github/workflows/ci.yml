name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taklifnoma_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taklifnoma_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taklifnoma_test?schema=public
      AUTH_SECRET: ci-test-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build
