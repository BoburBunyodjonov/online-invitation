# Hetzner VPS production stack: PostgreSQL + Next.js + Nginx
#
# Usage (on server, from repo root):
#   cp deploy/.env.production.example deploy/.env
#   # edit deploy/.env
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
#
# First deploy only — seed admin + templates:
#   RUN_SEED=true docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taklifnoma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: ${POSTGRES_DB:-taklifnoma}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taklifnoma} -d ${POSTGRES_DB:-taklifnoma}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-taklifnoma}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-taklifnoma}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in deploy/.env}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Set NEXT_PUBLIC_SITE_URL in deploy/.env}
      NEXT_PUBLIC_TELEGRAM_ADMIN_USERNAME: ${NEXT_PUBLIC_TELEGRAM_ADMIN_USERNAME:-online_invitation_admin}
      NEXT_PUBLIC_CONTACT_PHONE: ${NEXT_PUBLIC_CONTACT_PHONE:-+998 99 801 93 53}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      UPLOAD_DIR: /data/uploads
      RUN_SEED: ${RUN_SEED:-false}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      YANDEX_SITE_VERIFICATION: ${YANDEX_SITE_VERIFICATION:-}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}
      MONITORING_WEBHOOK_URL: ${MONITORING_WEBHOOK_URL:-}
    volumes:
      - upload_data:/data/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - upload_data:/var/www/uploads:ro

  certbot:
    image: certbot/certbot:latest
    profiles: ["ssl"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  upload_data:
  certbot_www:
  certbot_certs:
