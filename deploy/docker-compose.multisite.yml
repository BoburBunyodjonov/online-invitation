# Multi-site Hetzner: only DB + app (no nginx container).
# Host nginx (already serving bunyodjonov.uz) proxies online-invitation.uz → localhost:3010
#
# Usage:
#   cp deploy/.env.production.example deploy/.env
#   # edit deploy/.env — set domain to https://online-invitation.uz
#   docker compose -f deploy/docker-compose.multisite.yml --env-file deploy/.env up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: taklifnoma-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taklifnoma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: ${POSTGRES_DB:-taklifnoma}
    volumes:
      - taklifnoma_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taklifnoma} -d ${POSTGRES_DB:-taklifnoma}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - taklifnoma

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: taklifnoma-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_USER: ${POSTGRES_USER:-taklifnoma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: ${POSTGRES_DB:-taklifnoma}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in deploy/.env}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Set NEXT_PUBLIC_SITE_URL in deploy/.env}
      NEXT_PUBLIC_TELEGRAM_ADMIN_USERNAME: ${NEXT_PUBLIC_TELEGRAM_ADMIN_USERNAME:-online_invitation_admin}
      NEXT_PUBLIC_CONTACT_PHONE: ${NEXT_PUBLIC_CONTACT_PHONE:-+998 99 801 93 53}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      UPLOAD_DIR: /data/uploads
      RUN_SEED: ${RUN_SEED:-false}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      YANDEX_SITE_VERIFICATION: ${YANDEX_SITE_VERIFICATION:-}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}
      MONITORING_WEBHOOK_URL: ${MONITORING_WEBHOOK_URL:-}
    volumes:
      - taklifnoma_uploads:/data/uploads
    networks:
      - taklifnoma

networks:
  taklifnoma:
    driver: bridge

volumes:
  taklifnoma_postgres:
    name: taklifnoma_postgres
  taklifnoma_uploads:
    name: taklifnoma_uploads
