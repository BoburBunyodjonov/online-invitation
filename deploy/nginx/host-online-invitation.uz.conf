# Host nginx config for online-invitation.uz
# Install: sudo cp deploy/nginx/host-online-invitation.uz.conf /etc/nginx/sites-available/online-invitation.uz
#          sudo ln -sf /etc/nginx/sites-available/online-invitation.uz /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Certbot — does NOT touch bunyodjonov.uz):
#   sudo certbot --nginx -d online-invitation.uz -d www.online-invitation.uz

upstream taklifnoma_app {
  server 127.0.0.1:3001;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name online-invitation.uz www.online-invitation.uz;

  client_max_body_size 25m;

  # After certbot, this block gets a 443 redirect automatically.

  location /uploads/ {
    alias /var/lib/docker/volumes/taklifnoma_uploads/_data/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location / {
    proxy_pass http://taklifnoma_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
