# Local PostgreSQL for development. Start with: npm run db:up
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taklifnoma
    ports:
      - "5432:5432"
    volumes:
      - taklifnoma_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taklifnoma"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  taklifnoma_pgdata:
